<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Train PNR Status Tracker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 480px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; }
        h1 { color: #1e3c72; margin-bottom: 8px; font-size: 24px; }
        p.subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 14px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; font-weight: bold; letter-spacing: 2px; transition: border-color 0.3s; }
        input:focus { border-color: #1e3c72; outline: none; }
        button { background: #ff9933; color: white; border: none; padding: 14px 20px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #e68a00; }
        .loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid #1e3c72; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #resultCard { display: none; background: #f8f9fa; border-left: 5px solid #1e3c72; padding: 20px; border-radius: 8px; text-align: left; margin-top: 20px; }
        .res-row { margin-bottom: 10px; font-size: 15px; color: #333; }
        .res-label { font-weight: bold; color: #1e3c72; }
        .passenger-box { background: white; padding: 10px; border: 1px solid #eee; border-radius: 6px; margin-top: 8px; }
        .error-msg { display: none; color: #d9534f; background: #fdf7f7; padding: 12px; border-radius: 8px; margin-top: 20px; font-size: 14px; border: 1px solid #eed3d2; }
    </style>
</head>
<body>

<div class="container">
    <h1>🇮🇳 Indian Railways</h1>
    <p class="subtitle">Live PNR Status Dashboard</p>
    
    <div class="input-group">
        <input type="text" id="pnrInput" maxlength="10" placeholder="Enter 10-Digit PNR">
        <button onclick="checkPNR()">Check</button>
    </div>

    <div class="loader" id="loader"></div>
    <div class="error-msg" id="errorBox"></div>

    <div id="resultCard">
        <div class="res-row"><span class="res-label">Train:</span> <span id="trainDetails">N/A</span></div>
        <div class="res-row"><span class="res-label">Route:</span> <span id="routeDetails">N/A</span></div>
        <div class="res-row"><span class="res-label">Date of Journey:</span> <span id="dateDetails">N/A</span></div>
        <div class="res-row"><span class="res-label">Charting:</span> <span id="chartDetails">N/A</span></div>
        <hr style="margin: 15px 0; border: 0; border-top: 1px solid #ddd;">
        <div class="res-label">Passengers Status:</div>
        <div id="passengerList"></div>
    </div>
</div>

<script>
    async function checkPNR() {
        const pnr = document.getElementById('pnrInput').value.trim();
        const loader = document.getElementById('loader');
        const resultCard = document.getElementById('resultCard');
        const errorBox = document.getElementById('errorBox');
        
        // Clear old states
        errorBox.style.display = "none";
        resultCard.style.display = "none";

        if (!pnr || pnr.length !== 10 || isNaN(pnr)) {
            showError("Please enter a valid 10-digit numerical PNR status.");
            return;
        }

        loader.style.display = "block";

        try {
            const backendUrl = `https://pnr-checker-1.onrender.com/check-pnr/${pnr}`;
            
            const response = await fetch(backendUrl);
            if (!response.ok) throw new Error("Server communication breakdown.");
            
            const resData = await response.json();
            loader.style.display = "none";

            if (resData.success && resData.data) {
                const data = resData.data;
                
                // Map layout values
                document.getElementById('trainDetails').innerText = `${data.trainName} (${data.trainNumber})`;
                document.getElementById('routeDetails').innerText = `${data.sourceStation} ➔ ${data.destinationStation}`;
                document.getElementById('dateDetails').innerText = data.dateOfJourney;
                document.getElementById('chartDetails').innerText = data.chartStatus;
                
                // Clear and render passengers dynamically
                const pListContainer = document.getElementById('passengerList');
                pListContainer.innerHTML = "";
                
                data.passengerList.forEach(p => {
                    const pDiv = document.createElement('div');
                    pDiv.className = "passenger-box";
                    pDiv.innerHTML = `<strong>Passenger ${p.passengerSerialNumber}</strong><br>
                                       <span style="font-size:13px; color:#555;">Current: ${p.currentStatusDetails} | Booking: ${p.bookingStatusDetails}</span>`;
                    pListContainer.appendChild(pDiv);
                });

                resultCard.style.display = "block";
            } else {
                showError("No database matches found. Check PNR configuration.");
            }
        } catch (err) {
            loader.style.display = "none";
            showError("Failed to fetch. If waking the server up, this may take up to 60 seconds on the free tier. Try clicking 'Check' again!");
        }
    }

    function showError(msg) {
        const errorBox = document.getElementById('errorBox');
        errorBox.innerText = msg;
        errorBox.style.display = "block";
    }
</script>
</body>
</html>
